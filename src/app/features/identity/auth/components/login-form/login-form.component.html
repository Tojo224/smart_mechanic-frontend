<div class="metal-background">
  <div class="login-card">
    
    <div class="header-section">
      <div class="logo-container">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="icon">
          <path fill-rule="evenodd" d="M11.097 1.515a5.25 5.25 0 0 1 2.745 2.745l.951 2.535a.75.75 0 0 0 .546.467l2.642.44a5.25 5.25 0 0 1 3.513 3.513l.44 2.642a.75.75 0 0 0 .467.546l2.535.951a5.25 5.25 0 0 1 2.745 2.745l-.951 2.535a.75.75 0 0 0-.467.546l-2.642.44a5.25 5.25 0 0 1-3.513 3.513l-.44 2.642a.75.75 0 0 0-.546.467l-2.535.951a5.25 5.25 0 0 1-2.745 2.745l-2.535-.951a.75.75 0 0 0-.546-.467l-2.642-.44a5.25 5.25 0 0 1-3.513-3.513l-.44-2.642a.75.75 0 0 0-.467-.546l-2.535-.951a5.25 5.25 0 0 1-2.745-2.745l.951-2.535a.75.75 0 0 0 .467-.546l2.642-.44a5.25 5.25 0 0 1 3.513-3.513l.44-2.642a.75.75 0 0 0 .546-.467l2.535-.951ZM9 12a3 3 0 1 1 6 0 3 3 0 0 1-6 0Z" clip-rule="evenodd" />
        </svg>
      </div>
      <h1 class="title">SMART MECHANIC</h1>
      <p class="subtitle">Plataforma Automotriz SaaS</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="submitForm()" class="form-section">
      
      <div class="input-group">
        <label for="correo">Email</label>
        <input 
          id="correo" 
          type="email" 
          formControlName="correo" 
          placeholder="tu@email.com" 
          [class.is-invalid]="loginForm.get('correo')?.invalid && loginForm.get('correo')?.touched"
        />
      </div>

      <div class="input-group">
        <label for="contrasena">Contraseña</label>
        <input 
          id="contrasena" 
          type="password" 
          formControlName="contrasena" 
          placeholder="********" 
          [class.is-invalid]="loginForm.get('contrasena')?.invalid && loginForm.get('contrasena')?.touched"
        />
      </div>

      <div class="checkbox-group">
        <input type="checkbox" id="rememberMe" formControlName="rememberMe" />
        <label for="rememberMe">Recuerda mi sesión</label>
      </div>

      <button type="submit" class="btn-primary" [disabled]="loginForm.invalid">
        Iniciar Sesión
      </button>

    </form>

    <div class="footer-links">
      <a href="#" class="link">¿Olvidaste tu contraseña?</a>
      <div class="divider">
        <span>¿Eres nuevo?</span>
      </div>
      <a href="#" class="link highlight">Crear una cuenta</a>
    </div>

  </div>
</div>
