<form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
  <mat-form-field appearance="outline" class="full-width">
    <mat-label>Correo Electrónico</mat-label>
    <input matInput type="email" formControlName="correo" placeholder="ejemplo@taller.com">
    <mat-icon matPrefix>email</mat-icon>
    <mat-error *ngIf="loginForm.get('correo')?.hasError('required')">El correo es obligatorio.</mat-error>
    <mat-error *ngIf="loginForm.get('correo')?.hasError('email')">Debe ser un correo válido.</mat-error>
  </mat-form-field>

  <mat-form-field appearance="outline" class="full-width">
    <mat-label>Contraseña</mat-label>
    <input matInput [type]="hidePassword ? 'password' : 'text'" formControlName="contrasena">
    <mat-icon matPrefix>lock</mat-icon>
    <button mat-icon-button matSuffix (click)="hidePassword = !hidePassword" type="button" [attr.aria-label]="'Ocultar contraseña'">
      <mat-icon>{{hidePassword ? 'visibility_off' : 'visibility'}}</mat-icon>
    </button>
    <mat-error *ngIf="loginForm.get('contrasena')?.hasError('required')">La contraseña es obligatoria.</mat-error>
  </mat-form-field>

  <button mat-flat-button color="primary" type="submit" [disabled]="loginForm.invalid" class="submit-button">
    Iniciar Sesión
  </button>
</form>
