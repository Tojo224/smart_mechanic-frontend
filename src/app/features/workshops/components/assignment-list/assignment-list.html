<div class="table-container">
  <table mat-table [dataSource]="assignments()" class="mat-elevation-z0">
    
    <ng-container matColumnDef="id">
      <th mat-header-cell *matHeaderCellDef> ID </th>
      <td mat-cell *matCellDef="let element"> {{ element.id_incidente.substring(0, 8) }}... </td>
    </ng-container>

    <ng-container matColumnDef="descripcion">
      <th mat-header-cell *matHeaderCellDef> Descripción </th>
      <td mat-cell *matCellDef="let element"> {{ element.descripcion || 'Sin descripción' }} </td>
    </ng-container>

    <ng-container matColumnDef="prioridad">
      <th mat-header-cell *matHeaderCellDef> Prioridad </th>
      <td mat-cell *matCellDef="let element">
        <mat-chip-set>
          <mat-chip [color]="getPriorityColor(element.prioridad_incidente)" selected>
            {{ element.prioridad_incidente }}
          </mat-chip>
        </mat-chip-set>
      </td>
    </ng-container>

    <ng-container matColumnDef="estado">
      <th mat-header-cell *matHeaderCellDef> Estado </th>
      <td mat-cell *matCellDef="let element"> {{ element.estado_incidente }} </td>
    </ng-container>

    <ng-container matColumnDef="acciones">
      <th mat-header-cell *matHeaderCellDef> Acciones </th>
      <td mat-cell *matCellDef="let element">
        <button mat-button color="primary" (click)="viewDetail.emit(element.id_incidente)">
          Ver Detalle
        </button>
        <button mat-stroked-button color="accent" (click)="updateStatus.emit(element)">
          Estado
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>

  @if (assignments().length === 0) {
    <div class="empty-state">
      <p>No tienes asignaciones pendientes.</p>
    </div>
  }
</div>
